{{define "embed"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Flipbook.Title}}</title>
    <link rel="stylesheet" href="/static/css/viewer.css">
    <style>
        body { margin: 0; overflow: hidden; }
        #viewer-wrapper { height: 100vh; }
        #controls { border-radius: 0; }
        #btn-share, #btn-grid { display: none; }
        .embed-watermark {
            position: fixed; bottom: 48px; right: 12px;
            font-size: 11px; color: rgba(255,255,255,0.4);
            text-decoration: none; z-index: 100;
        }
        .embed-watermark:hover { color: rgba(255,255,255,0.7); }
    </style>
</head>
<body>
    <div id="viewer-wrapper">
        <div id="flipbook-container">
            <div id="flipbook"></div>
        </div>

        <div id="controls">
            <button id="btn-prev" title="Previous">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <span id="page-indicator">
                <span id="current-page">1</span> / <span id="total-pages">{{.Flipbook.PageCount}}</span>
            </span>
            <button id="btn-next" title="Next">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
            <div id="page-slider-container">
                <input type="range" id="page-slider" min="1" max="{{.Flipbook.PageCount}}" value="1">
            </div>
            <div class="controls-spacer"></div>
            <button id="btn-grid" title="Grid view">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            </button>
            <button id="btn-fullscreen" title="Fullscreen">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
            </button>
            <button id="btn-share" title="Share">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            </button>
        </div>
    </div>

    <a href="{{.BaseURL}}/v/{{.Flipbook.Slug}}" target="_blank" class="embed-watermark">Flipbook</a>

    <script>
        window.FLIPBOOK_DATA = {
            id: "{{.Flipbook.ID}}",
            title: "{{.Flipbook.Title}}",
            pageCount: {{.Flipbook.PageCount}},
            pageWidth: {{.Flipbook.PageWidth}},
            pageHeight: {{.Flipbook.PageHeight}},
            pages: [{{range $i, $p := .Pages}}"{{$p}}"{{if not (last $i $.Flipbook.PageCount)}},{{end}}{{end}}]
        };
    </script>
    <script src="/static/js/page-flip.browser.js"></script>
    <script src="/static/js/viewer.js"></script>
</body>
</html>
{{end}}
